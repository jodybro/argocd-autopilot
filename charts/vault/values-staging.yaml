# Staging environment overrides

vault:
  server:
    standalone:
      enabled: true

    replicas: 1

    dataStorage:
      enabled: true
      size: 5Gi

    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi

  injector:
    enabled: true

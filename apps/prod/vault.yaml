apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault-prod
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd-autopilot
    environment: prod
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: prod
  source:
    repoURL: https://github.com/jodybro/argocd-autopilot.git
    targetRevision: main
    path: charts/vault
    helm:
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  # No automated sync for production - requires manual sync as a safety gate
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

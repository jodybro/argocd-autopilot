# -- Repository URL for this GitOps repo (update to match your fork)
repoURL: https://github.com/jodybro/argocd-autopilot.git

# -- Target branch ArgoCD watches for changes
targetRevision: main

# -- ArgoCD Helm chart configuration
argo-cd:
  ## CRDs are pre-installed by scripts/install.sh before Helm runs.
  ## This avoids annotation size limits on large CRD manifests.
  crds:
    install: false
    keep: true

  ## Server
  server:
    service:
      type: ClusterIP

  ## Controller
  controller:
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  ## Repo Server
  repoServer:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi

  ## Redis
  redis:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

  ## Configs
  configs:
    params:
      # Allow insecure access for local dev; disable in production
      server.insecure: true
    cm:
      # Custom health check: treat Ingress as Healthy even without LB status
      resource.customizations.health.networking.k8s.io_Ingress: |
        hs = {}
        hs.status = "Healthy"
        hs.message = ""
        if obj.status ~= nil then
          if obj.status.loadBalancer ~= nil then
            if obj.status.loadBalancer.ingress ~= nil then
              for i, ingress in ipairs(obj.status.loadBalancer.ingress) do
                if ingress.hostname ~= nil and ingress.hostname ~= "" then
                  hs.message = ingress.hostname
                elseif ingress.ip ~= nil and ingress.ip ~= "" then
                  hs.message = ingress.ip
                end
              end
            end
          end
        end
        return hs

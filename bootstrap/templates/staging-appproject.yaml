apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: staging
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd-autopilot
    environment: staging
spec:
  description: Staging environment project
  sourceRepos:
    - "https://github.com/jodybro/argocd-autopilot.git"
  destinations:
    - namespace: argocd
      server: https://kubernetes.default.svc
    - namespace: staging
      server: https://kubernetes.default.svc
    - namespace: "staging-*"
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: ""
      kind: "*"
    - group: apps
      kind: "*"
    - group: networking.k8s.io
      kind: "*"
    - group: argoproj.io
      kind: Application
  orphanedResources:
    warn: true

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-apps
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd-autopilot
    environment: dev
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: dev
  source:
    repoURL: "https://github.com/jodybro/argocd-autopilot.git"
    targetRevision: {{ .Values.targetRevision }}
    path: apps/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      selfHeal: true
      prune: true

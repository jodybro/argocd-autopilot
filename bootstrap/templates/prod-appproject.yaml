apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: prod
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd-autopilot
    environment: prod
spec:
  description: Production environment project
  sourceRepos:
    - "https://github.com/jodybro/argocd-autopilot.git"
  destinations:
    - namespace: argocd
      server: https://kubernetes.default.svc
    - namespace: prod
      server: https://kubernetes.default.svc
    - namespace: "prod-*"
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: ""
      kind: "*"
    - group: apps
      kind: "*"
    - group: networking.k8s.io
      kind: "*"
    - group: argoproj.io
      kind: Application
